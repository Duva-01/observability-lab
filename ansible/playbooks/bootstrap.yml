---
- name: Validar prerrequisitos del laboratorio
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Comprobar que kubectl está instalado
      ansible.builtin.command: kubectl version --client
      changed_when: false

    - name: Comprobar que helm está instalado
      ansible.builtin.command: helm version
      changed_when: false

    - name: Comprobar que minikube está instalado
      ansible.builtin.command: minikube version
      changed_when: false

    - name: Mostrar contexto actual de kubectl
      ansible.builtin.command: kubectl config current-context
      changed_when: false
      register: kubectl_context

    - name: Mostrar estado de minikube
      ansible.builtin.command: minikube status
      changed_when: false
      register: minikube_status

    - name: Resumen de bootstrap
      ansible.builtin.debug:
        msg:
          - "Contexto actual: {{ kubectl_context.stdout }}"
          - "Estado de minikube:"
          - "{{ minikube_status.stdout_lines }}"
