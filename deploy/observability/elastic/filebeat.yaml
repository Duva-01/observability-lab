apiVersion: beat.k8s.elastic.co/v1beta1
kind: Beat
metadata:
  name: mercadona-filebeat
  namespace: observability
spec:
  type: filebeat
  version: 9.2.3
  elasticsearchRef:
    name: mercadona-logs
  config:
    filebeat.inputs:
      - type: filestream
        id: kubernetes-container-logs
        prospector.scanner.symlinks: true
        parsers:
          - container: ~
        paths:
          - /var/log/containers/*.log
    processors:
      - decode_json_fields:
          when:
            regexp:
              message: '^\{'
          fields: ["message"]
          target: ""
          overwrite_keys: true
          add_error_key: true
          expand_keys: true
      - add_kubernetes_metadata: {}
  daemonSet:
    podTemplate:
      spec:
        serviceAccountName: mercadona-filebeat
        automountServiceAccountToken: true
        securityContext:
          runAsUser: 0
        containers:
          - name: filebeat
            volumeMounts:
              - name: varlogcontainers
                mountPath: /var/log/containers
              - name: varlogpods
                mountPath: /var/log/pods
              - name: varlibdockercontainers
                mountPath: /var/lib/docker/containers
        volumes:
          - name: varlogcontainers
            hostPath:
              path: /var/log/containers
          - name: varlogpods
            hostPath:
              path: /var/log/pods
          - name: varlibdockercontainers
            hostPath:
              path: /var/lib/docker/containers
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mercadona-filebeat
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mercadona-filebeat
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mercadona-filebeat
subjects:
  - kind: ServiceAccount
    name: mercadona-filebeat
    namespace: observability
roleRef:
  kind: ClusterRole
  name: mercadona-filebeat
  apiGroup: rbac.authorization.k8s.io
