apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["prometheus.observability.svc.cluster.local:9090"]

      - job_name: grafana
        static_configs:
          - targets: ["grafana.observability.svc.cluster.local:3000"]

      - job_name: user-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["user-service.default.svc.cluster.local:8080"]

      - job_name: product-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["product-service.default.svc.cluster.local:8080"]

      - job_name: order-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["order-service.default.svc.cluster.local:8080"]

      - job_name: api-gateway
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["api-gateway.default.svc.cluster.local:8080"]

      - job_name: kube-state-metrics
        static_configs:
          - targets: ["kube-state-metrics.observability.svc.cluster.local:8080"]
      
      - job_name: node-exporter
        static_configs:
          - targets: ["node-exporter.observability.svc.cluster.local:9100"]
