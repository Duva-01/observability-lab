          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "max by (job) (scrape_duration_seconds{job=~\"api-gateway|user-service|product-service|order-service|prometheus|grafana\"})",
              "legendFormat": "{{job}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Duracion de scrape",
          "type": "timeseries"
        }
