stages:
  - build
  - test
  - package
  - validate
  - image
  - deploy


variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "-B -ntp"

cache:
  key: maven-cache
  paths:
    - .m2/repository

build:
  stage: build
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests clean compile

test:
  stage: test
  image: maven:3.9.9-eclipse-temurin-17
  services:
    - name: docker:27.5.1-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - mvn $MAVEN_CLI_OPTS test

package:
  stage: package
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests package

validate_helm:
  stage: validate
  image: alpine/helm:3.17.3
  script:
    - helm lint deploy/helm/postgres
    - helm lint deploy/helm/user-service
    - helm lint deploy/helm/product-service
    - helm lint deploy/helm/order-service
    - helm lint deploy/helm/api-gateway
    - helm template postgres deploy/helm/postgres -f deploy/environments/minikube/postgres-values.yaml > /tmp/postgres.yaml
    - helm template user-service deploy/helm/user-service -f deploy/environments/minikube/user-service-values.yaml > /tmp/user-service.yaml
    - helm template product-service deploy/helm/product-service -f deploy/environments/minikube/product-service-values.yaml > /tmp/product-service.yaml
    - helm template order-service deploy/helm/order-service -f deploy/environments/minikube/order-service-values.yaml > /tmp/order-service.yaml
    - helm template api-gateway deploy/helm/api-gateway -f deploy/environments/minikube/api-gateway-values.yaml > /tmp/api-gateway.yaml

.build_image_template:
  stage: image
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - mkdir -p /kaniko/.docker
    - >
      cat > /kaniko/.docker/config.json <<EOF
      {"auths":{"$CI_REGISTRY":{"username":"$CI_REGISTRY_USER","password":"$CI_REGISTRY_PASSWORD"}}}
      EOF
    - >
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/${SERVICE}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/${SERVICE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}/${SERVICE}:main"
      --skip-tls-verify-registry "${CI_REGISTRY}"

build_api_gateway_image:
  extends: .build_image_template
  variables:
    SERVICE: "api-gateway"

build_user_service_image:
  extends: .build_image_template
  variables:
    SERVICE: "user-service"

build_order_service_image:
  extends: .build_image_template
  variables:
    SERVICE: "order-service"

build_product_service_image:
  extends: .build_image_template
  variables:
    SERVICE: "product-service"

  script:
    - helm upgrade --install postgres deploy/helm/postgres --namespace default -f deploy/environments/minikube/postgres-values.yaml
    - >
      helm upgrade --install user-service deploy/helm/user-service
      --namespace default
      -f deploy/environments/minikube/user-service-values.yaml
      --set image.repository="${CI_REGISTRY_IMAGE}/user-service"
      --set image.tag="${CI_COMMIT_SHORT_SHA}"
    - >
      helm upgrade --install product-service deploy/helm/product-service
      --namespace default
      -f deploy/environments/minikube/product-service-values.yaml
      --set image.repository="${CI_REGISTRY_IMAGE}/product-service"
      --set image.tag="${CI_COMMIT_SHORT_SHA}"
    - >
      helm upgrade --install order-service deploy/helm/order-service
      --namespace default
      -f deploy/environments/minikube/order-service-values.yaml
      --set image.repository="${CI_REGISTRY_IMAGE}/order-service"
      --set image.tag="${CI_COMMIT_SHORT_SHA}"
    - >
      helm upgrade --install api-gateway deploy/helm/api-gateway
      --namespace default
      -f deploy/environments/minikube/api-gateway-values.yaml
      --set image.repository="${CI_REGISTRY_IMAGE}/api-gateway"
      --set image.tag="${CI_COMMIT_SHORT_SHA}"
    - kubectl rollout status deployment/user-service -n default --timeout=180s
    - kubectl rollout status deployment/product-service -n default --timeout=180s
    - kubectl rollout status deployment/order-service -n default --timeout=180s
    - kubectl rollout status deployment/api-gateway -n default --timeout=180s

